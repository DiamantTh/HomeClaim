# =====================================================================
# Flag Profiles (optional, fuer alle Modi nutzbar)
# =====================================================================
homeclaim:
  flagProfiles:
    - name: "deny-build"
      flags:
        BUILD: false
    - name: "pvp-off"
      flags:
        PVP: false

