# HomeClaim Paper Konfiguration (Beispiele)
# Kopiere diese Datei nach config.yml und passe die Werte an.
#
# STORAGE:
# - Nur JDBC verfügbar (SQLite, PostgreSQL, MySQL, MariaDB)
# - SQLite ist Standard (keine externe Datenbank nötig)

# =====================================================================
# JDBC mit SQLite (empfohlen für einfache Setups)
# =====================================================================
homeclaim:
  locale: "en"
  storage:
    type: JDBC
    driver: "SQLITE"                                # oder: POSTGRES, MYSQL, MARIADB
    sqliteFile: "plugins/HomeClaim/homeclaim.db"   # nur für SQLite
    host: "localhost"                               # für PostgreSQL/MySQL/MariaDB
    port: 5432                                       # für PostgreSQL/MySQL/MariaDB
    database: "homeclaim"                           # für PostgreSQL/MySQL/MariaDB
    username: "homeclaim"                           # für PostgreSQL/MySQL/MariaDB
    password: "change-me"                           # für PostgreSQL/MySQL/MariaDB
    encoding: "UTF-8"
    maximumPoolSize: 10
  rest:
    enabled: false
    port: 8080
    token: "change-me"         # REQUIRED wenn enabled=true
    tokenEnv: ""               # optional: ENV var name
    tokenFile: ""              # optional: file path with token
    rateLimitPerMinute: 120    # 0/leer = deaktiviert
    allowLocalhost: false
    allowedHosts: []           # optional allowlist, z.B. ["127.0.0.1"]

