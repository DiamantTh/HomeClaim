[homeclaim]
locale = "en"

[homeclaim.storage]
type = "JDBC"
driver = "SQLITE"
sqliteFile = "plugins/HomeClaim/homeclaim.db"
encoding = "UTF-8"
maximumPoolSize = 10

[homeclaim.rest]
enabled = false
port = 8080
token = ""
tokenEnv = ""
tokenFile = ""
rateLimitPerMinute = 0
allowLocalhost = false
allowedHosts = []

[homeclaim.migrations]
enabled = true
allowNonPostgres = false
baselineOnMigrate = true
locations = ["classpath:db/migration"]

