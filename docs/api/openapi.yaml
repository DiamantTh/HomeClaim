openapi: "3.0.3"
info:
  title: "HomeClaim Plot API"
  description: |
    REST API for managing Minecraft plots, zones, and player permissions in HomeClaim.
    
    ## Authentication
    All endpoints require the `X-Admin-Token` header with a valid authentication token.
    
    ## Rate Limiting
    The API implements rate limiting per token. Default: 60 requests per minute.
    
    ## Base URL
    Local: `http://localhost:8080/api/v1`
  version: "1.0.0"
  contact:
    name: "HomeClaim Support"

servers:
  - url: "http://localhost:8080/api/v1"
    description: "Local Development Server"

security:
  - ApiToken: []

tags:
  - name: Health
    description: Server health and info endpoints
  - name: Plots
    description: Plot (Region) management
  - name: Entry
    description: Entry deny checks, deny rules, reports, and temporary force-entry grants
  - name: Players
    description: Player-related operations
  - name: Zones
    description: Zone management
  - name: Profiles
    description: Flag profile management
  - name: Admin
    description: Administrative operations

paths:
  /health:
    get:
      summary: Health check
      description: Returns the server health status and version information.
      tags: [Health]
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /info:
    get:
      summary: API information
      description: Returns API version and available endpoints.
      tags: [Health]
      responses:
        "200":
          description: API information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiInfo"

  /plots:
    get:
      summary: List plots
      description: |
        Returns a paginated list of plots with optional filtering.
        At least one filter (world, owner, or available) should be provided.
      tags: [Plots]
      parameters:
        - name: world
          in: query
          schema:
            type: string
          description: Filter plots by world name
        - name: owner
          in: query
          schema:
            type: string
            format: uuid
          description: Filter plots by owner UUID
        - name: available
          in: query
          schema:
            type: boolean
          description: If true, only show plots that are for sale (price > 0)
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
          description: Maximum number of plots to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of plots to skip (for pagination)
      responses:
        "200":
          description: List of plots
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Plot"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

  /plots/at:
    get:
      summary: Get plot at coordinates
      description: Returns the plot at the specified world coordinates.
      tags: [Plots]
      parameters:
        - name: world
          in: query
          required: true
          schema:
            type: string
          description: World name
        - name: x
          in: query
          required: true
          schema:
            type: integer
          description: X coordinate
        - name: y
          in: query
          schema:
            type: integer
            default: 64
          description: Y coordinate (optional, defaults to 64)
        - name: z
          in: query
          required: true
          schema:
            type: integer
          description: Z coordinate
      responses:
        "200":
          description: Plot found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plot"
        "404":
          $ref: "#/components/responses/NotFound"

  /plots/{id}:
    get:
      summary: Get plot by ID
      description: Returns detailed information about a specific plot.
      tags: [Plots]
      parameters:
        - $ref: "#/components/parameters/PlotId"
      responses:
        "200":
          description: Plot details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plot"
        "404":
          $ref: "#/components/responses/NotFound"

  /plots/{id}/buy:
    post:
      summary: Buy a plot
      description: Initiates a purchase for a plot that is for sale.
      tags: [Plots]
      parameters:
        - $ref: "#/components/parameters/PlotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [buyerId]
              properties:
                buyerId:
                  type: string
                  format: uuid
                  description: UUID of the player buying the plot
      responses:
        "200":
          description: Purchase initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          description: Plot is not for sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /plots/{id}/sell:
    post:
      summary: Put plot up for sale
      description: Lists a plot for sale at the specified price.
      tags: [Plots]
      parameters:
        - $ref: "#/components/parameters/PlotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [price]
              properties:
                price:
                  type: number
                  format: double
                  minimum: 0
                  description: Sale price (0 = remove from sale)
      responses:
        "200":
          description: Plot listed for sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /plots/{id}/flags:
    post:
      summary: Update plot flag
      description: Sets or updates a flag on the plot.
      tags: [Plots]
      parameters:
        - $ref: "#/components/parameters/PlotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, value]
              properties:
                key:
                  type: string
                  description: Flag key (e.g., "pvp", "mob-spawn")
                value:
                  description: Flag value (boolean, integer, or string)
                  oneOf:
                    - type: boolean
                    - type: integer
                    - type: string
      responses:
        "200":
          description: Flag updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /plots/{id}/limits:
    post:
      summary: Update plot limit
      description: Sets or updates a limit on the plot.
      tags: [Plots]
      parameters:
        - $ref: "#/components/parameters/PlotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, value]
              properties:
                key:
                  type: string
                  description: Limit key (e.g., "entity-cap", "hopper-limit")
                value:
                  description: Limit value
                  oneOf:
                    - type: boolean
                    - type: integer
                    - type: string
      responses:
        "200":
          description: Limit updated

  /plots/entry-check:
    post:
      summary: Check entry at coordinates
      description: Evaluates whether a player may enter the plot at the provided coordinates.
      tags: [Entry]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryCheckByPositionRequest"
      responses:
        "200":
          description: Entry decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntryCheckResponse"

  /plots/{id}/entry-check:
    post:
      summary: Check plot entry
      description: Evaluates whether a player may enter a specific plot.
      tags: [Entry]
      parameters:
        - $ref: "#/components/parameters/PlotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryCheckRequest"
      responses:
        "200":
          description: Entry decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntryCheckResponse"

  /plots/{id}/entry-denies:
    get:
      summary: List entry deny rules
      description: Returns active entry deny rules by default. Use includeInactive=true for reported/revoked/expired rules.
      tags: [Entry]
      parameters:
        - $ref: "#/components/parameters/PlotId"
        - name: includeInactive
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Entry deny rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EntryDenyRule"
    post:
      summary: Create entry deny rule
      description: Creates a reasoned entry deny rule for one player, a name, or a wildcard target.
      tags: [Entry]
      parameters:
        - $ref: "#/components/parameters/PlotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryDenyCreateRequest"
      responses:
        "200":
          description: Created entry deny rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntryDenyRule"

  /plots/{id}/entry-denies/{denyId}/report:
    post:
      summary: Report entry deny rule
      description: Marks a deny rule as reported for staff review.
      tags: [Entry]
      parameters:
        - $ref: "#/components/parameters/PlotId"
        - $ref: "#/components/parameters/EntryDenyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryDenyReportRequest"
      responses:
        "200":
          description: Entry deny rule reported

  /plots/{id}/entry-denies/{denyId}/revoke:
    post:
      summary: Revoke entry deny rule
      description: Revokes an entry deny rule with an audit-visible reason.
      tags: [Entry]
      parameters:
        - $ref: "#/components/parameters/PlotId"
        - $ref: "#/components/parameters/EntryDenyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryDenyRevokeRequest"
      responses:
        "200":
          description: Entry deny rule revoked

  /plots/{id}/entry-force:
    post:
      summary: Grant temporary force-entry
      description: Creates a short-lived in-memory grant for one player to pass an otherwise denied entry check. Grant creation and use are written to audit.
      tags: [Entry]
      parameters:
        - $ref: "#/components/parameters/PlotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryForceRequest"
      responses:
        "200":
          description: Temporary force-entry grant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntryForceGrant"

  /plots/{id}/trust:
    post:
      summary: Trust a player
      description: Adds a player to the plot's trusted list.
      tags: [Plots]
      parameters:
        - $ref: "#/components/parameters/PlotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [playerId]
              properties:
                playerId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Player trusted

  /plots/{id}/untrust:
    post:
      summary: Untrust a player
      description: Removes a player from the plot's trusted list.
      tags: [Plots]
      parameters:
        - $ref: "#/components/parameters/PlotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [playerId]
              properties:
                playerId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Player untrusted

  /plots/{id}/components:
    get:
      summary: List plot components
      description: Returns all components (redstone devices, containers, etc.) in the plot.
      tags: [Plots]
      parameters:
        - $ref: "#/components/parameters/PlotId"
      responses:
        "200":
          description: List of components
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Component"

  /plots/{id}/applyProfile:
    post:
      summary: Apply flag profile
      description: Applies a predefined flag profile to the plot.
      tags: [Plots]
      parameters:
        - $ref: "#/components/parameters/PlotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [profile]
              properties:
                profile:
                  type: string
                  description: Name of the profile to apply
      responses:
        "200":
          description: Profile applied

  /players/{uuid}/plots:
    get:
      summary: List player's plots
      description: Returns all plots owned by the specified player.
      tags: [Players]
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Player UUID
      responses:
        "200":
          description: List of player's plots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plot"

  /players/{uuid}/stats:
    get:
      summary: Get player statistics
      description: Returns statistics about the player's plots.
      tags: [Players]
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Player UUID
      responses:
        "200":
          description: Player statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerStats"

  /zones:
    get:
      summary: List zones
      description: Returns all zones in the specified world.
      tags: [Zones]
      parameters:
        - name: world
          in: query
          required: true
          schema:
            type: string
          description: World name
      responses:
        "200":
          description: List of zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Zone"

  /profiles:
    get:
      summary: List flag profiles
      description: Returns all available flag profiles.
      tags: [Profiles]
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FlagProfile"
    post:
      summary: Create/update profile
      description: Creates a new profile or updates an existing one.
      tags: [Profiles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                flags:
                  type: object
                  additionalProperties: true
                limits:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Profile created/updated

  /admin/stats:
    get:
      summary: Server statistics
      description: Returns server statistics and API information.
      tags: [Admin]
      responses:
        "200":
          description: Server statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStats"

components:
  securitySchemes:
    ApiToken:
      type: apiKey
      in: header
      name: X-Admin-Token
      description: Admin authentication token

  parameters:
    PlotId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Plot UUID
    EntryDenyId:
      name: denyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Entry deny rule UUID

  responses:
    Unauthorized:
      description: Invalid or missing authentication token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok"
        version:
          type: string
          example: "1.0.0"
        storage:
          type: string
          example: "jdbc"
        timestamp:
          type: integer
          format: int64

    ApiInfo:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        endpoints:
          type: array
          items:
            type: string

    ApiSuccess:
      type: object
      properties:
        status:
          type: string
        data:
          type: object
          additionalProperties: true

    ApiError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    Plot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        world:
          type: string
        owner:
          type: string
          format: uuid
        bounds:
          $ref: "#/components/schemas/Bounds"
        shape:
          type: string
          enum: [CUBOID, POLYGON]
        price:
          type: number
          format: double
        flags:
          type: object
          additionalProperties: true
        limits:
          type: object
          additionalProperties: true
        trusted:
          type: array
          items:
            type: string
            format: uuid
        members:
          type: array
          items:
            type: string
            format: uuid
        banned:
          type: array
          items:
            type: string
            format: uuid
        entryDenies:
          type: array
          items:
            $ref: "#/components/schemas/EntryDenyRule"

    EntryDenyRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        regionId:
          type: string
          format: uuid
        targetType:
          type: string
          enum: [PLAYER_UUID, PLAYER_NAME, WILDCARD]
        targetValue:
          type: string
        reason:
          type: string
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [ACTIVE, REPORTED, REVOKED]
        reportedBy:
          type: string
          format: uuid
          nullable: true
        reportedAt:
          type: string
          format: date-time
          nullable: true
        reportReason:
          type: string
          nullable: true
        revokedBy:
          type: string
          format: uuid
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true
        revokeReason:
          type: string
          nullable: true

    EntryDenyCreateRequest:
      type: object
      required: [targetType, targetValue, reason, createdBy]
      properties:
        targetType:
          type: string
          enum: [PLAYER_UUID, PLAYER_NAME, WILDCARD]
        targetValue:
          type: string
        reason:
          type: string
        createdBy:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time

    EntryDenyReportRequest:
      type: object
      required: [reportedBy, reason]
      properties:
        reportedBy:
          type: string
          format: uuid
        reason:
          type: string

    EntryDenyRevokeRequest:
      type: object
      required: [revokedBy]
      properties:
        revokedBy:
          type: string
          format: uuid
        reason:
          type: string

    EntryCheckRequest:
      type: object
      required: [playerId]
      properties:
        playerId:
          type: string
          format: uuid
        playerName:
          type: string
        bypass:
          type: boolean
          default: false

    EntryCheckByPositionRequest:
      allOf:
        - $ref: "#/components/schemas/EntryCheckRequest"
        - type: object
          required: [world, x, y, z]
          properties:
            world:
              type: string
            x:
              type: integer
            y:
              type: integer
            z:
              type: integer

    EntryCheckResponse:
      type: object
      properties:
        allowed:
          type: boolean
        reason:
          type: string
        regionId:
          type: string
          format: uuid
          nullable: true
        entryDenyId:
          type: string
          format: uuid
          nullable: true
        detail:
          type: string
          nullable: true

    EntryForceRequest:
      type: object
      required: [playerId, grantedBy, reason]
      properties:
        playerId:
          type: string
          format: uuid
        grantedBy:
          type: string
          format: uuid
        reason:
          type: string
        ttlSeconds:
          type: integer
          format: int64
          default: 30
          minimum: 1
          maximum: 300

    EntryForceGrant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        playerId:
          type: string
          format: uuid
        regionId:
          type: string
          format: uuid
          nullable: true
        grantedBy:
          type: string
          format: uuid
        reason:
          type: string
        expiresAt:
          type: string
          format: date-time

    Bounds:
      type: object
      properties:
        minX:
          type: integer
        maxX:
          type: integer
        minY:
          type: integer
        maxY:
          type: integer
        minZ:
          type: integer
        maxZ:
          type: integer

    Component:
      type: object
      properties:
        id:
          type: string
          format: uuid
        regionId:
          type: string
          format: uuid
        type:
          type: string
        position:
          $ref: "#/components/schemas/Position"
        state:
          type: string

    Position:
      type: object
      properties:
        world:
          type: string
        x:
          type: integer
        y:
          type: integer
        z:
          type: integer

    Zone:
      type: object
      properties:
        id:
          type: string
          format: uuid
        world:
          type: string
        shape:
          type: string
        bounds:
          $ref: "#/components/schemas/Bounds"
        priority:
          type: integer
        tags:
          type: array
          items:
            type: string

    PlayerStats:
      type: object
      properties:
        playerId:
          type: string
          format: uuid
        plotCount:
          type: integer
        totalArea:
          type: integer
          description: Total area in blocks (XZ plane)
        plotsForSale:
          type: integer

    FlagProfile:
      type: object
      properties:
        name:
          type: string
        flags:
          type: object
          additionalProperties: true
        limits:
          type: object
          additionalProperties: true

    ServerStats:
      type: object
      properties:
        uptime:
          type: integer
          format: int64
        apiVersion:
          type: string
        storageType:
          type: string
